<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Handler</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Task Handler</h1>

  <!-- TOP RIGHT BUTTONS -->
  <div class="top-buttons">
    <button id="themeToggle">Dark Mode 🌙</button>
    <button id="clearHistoryBtn">Clear History 🗑️</button>
  </div>

  <div class="input-section">
    <input id="taskInput" placeholder="Enter a task">
    <input id="noteInput" placeholder="Add notes (optional)">
    <input type="date" id="dueDate">

    <select id="priority">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>

    <button id="addBtn" onclick="addTask()">Add</button>
    <button id="clearBtn">Clear All</button>
  </div>

  <ul id="taskList"></ul>
  <p id="taskCount"></p>

  <h3>Task History</h3>
  <div id="historyList"></div>

  <!-- EDIT MODAL -->
  <div id="editModal">
    <div class="modal-content">
      <h3>Edit Task</h3>

      <input id="editTaskInput"><br>
      <input type="date" id="editDueDate"><br>

      <select id="editPriority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select><br>

      <button onclick="saveEdit()">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
